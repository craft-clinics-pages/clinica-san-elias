<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clínica Veterinaria San Elías</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      --font-display: 'Raleway', sans-serif;
      --font-body: 'Source Sans 3', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--bg-white);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    ::selection { background: var(--color-accent-light); color: white; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-light); }
    ::-webkit-scrollbar-thumb { background: var(--color-accent); border-radius: 3px; }

    /* ── Utility ── */
    .container { max-width: 1140px; margin: 0 auto; padding: 0 32px; }
    .section-label {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-display);
      font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--color-accent);
      margin-bottom: 16px;
    }
    .section-label::before {
      content: '';
      display: block; width: 24px; height: 2px;
      background: var(--color-accent);
    }
    h1,h2,h3 { font-family: var(--font-display); font-weight: 700; line-height: 1.15; }
    p { line-height: 1.7; color: var(--text-muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      font-family: var(--font-display); font-weight: 600; font-size: 15px;
      padding: 14px 32px; border-radius: var(--radius-md);
      border: none; cursor: pointer; transition: all 0.22s ease;
      text-decoration: none; white-space: nowrap;
    }
    .btn-primary {
      background: var(--color-accent);
      color: white;
      box-shadow: 0 4px 20px rgba(42,184,212,0.35);
    }
    .btn-primary:hover {
      background: var(--color-accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(42,184,212,0.45);
    }
    .btn-outline {
      background: transparent;
      color: white;
      border: 2px solid rgba(255,255,255,0.5);
    }
    .btn-outline:hover {
      border-color: white;
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }
    .btn-navy {
      background: var(--color-primary);
      color: white;
      box-shadow: 0 4px 20px rgba(26,74,122,0.3);
    }
    .btn-navy:hover {
      background: var(--color-primary-dark);
      transform: translateY(-2px);
    }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 0 32px;
      transition: all 0.3s ease;
    }
    nav.scrolled {
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow-sm);
    }
    .nav-inner {
      max-width: 1140px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 76px;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
    }
    .nav-logo img { height: 48px; width: auto; }
    .nav-links {
      display: flex; align-items: center; gap: 36px;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--font-display); font-size: 14px; font-weight: 600;
      color: var(--color-primary); text-decoration: none; letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--color-accent); }
    nav.transparent .nav-links a { color: white; }
    nav.transparent .nav-links a:hover { color: var(--color-accent-light); }
    .nav-cta {
      font-family: var(--font-display); font-size: 14px; font-weight: 700;
      background: var(--color-accent); color: white;
      padding: 10px 24px; border-radius: var(--radius-md);
      text-decoration: none; transition: all 0.2s;
      box-shadow: 0 3px 14px rgba(42,184,212,0.35);
    }
    .nav-cta:hover {
      background: var(--color-accent-dark);
      transform: translateY(-1px);
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--color-primary-dark) 0%, var(--color-primary) 50%, #1a6080 100%);
      position: relative; overflow: hidden;
      display: flex; align-items: center;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 80% at 70% 50%, rgba(42,184,212,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(42,184,212,0.10) 0%, transparent 60%);
    }
    .hero-grid {
      position: absolute; inset: 0; opacity: 0.04;
      background-image:
        linear-gradient(rgba(255,255,255,0.6) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.6) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .hero-content {
      position: relative; z-index: 2;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 60px; align-items: center;
      max-width: 1140px; margin: 0 auto; padding: 120px 32px 80px;
      width: 100%;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(42,184,212,0.18); border: 1px solid rgba(42,184,212,0.35);
      color: var(--color-accent-light); border-radius: 100px;
      padding: 6px 16px; font-size: 12px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 24px;
    }
    .hero-badge-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--color-accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    .hero h1 {
      font-size: clamp(38px, 5vw, 62px);
      color: white; line-height: 1.08; margin-bottom: 24px;
    }
    .hero h1 span { color: var(--color-accent); }
    .hero-sub {
      font-size: 18px; color: rgba(255,255,255,0.72);
      margin-bottom: 40px; max-width: 480px; line-height: 1.65;
    }
    .hero-actions {
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .hero-stats {
      display: flex; gap: 32px; margin-top: 56px; flex-wrap: wrap;
    }
    .hero-stat-num {
      font-family: var(--font-display); font-size: 32px; font-weight: 800;
      color: white; line-height: 1;
    }
    .hero-stat-num span { color: var(--color-accent); }
    .hero-stat-label {
      font-size: 13px; color: rgba(255,255,255,0.55);
      margin-top: 4px; font-weight: 500;
    }
    .hero-visual {
      display: flex; align-items: center; justify-content: center;
    }
    .hero-card-stack {
      position: relative; width: 360px; height: 420px;
    }
    .hero-card {
      position: absolute;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: var(--radius-xl);
      padding: 28px;
      transition: transform 0.3s ease;
    }
    .hero-card-main {
      top: 0; left: 0; right: 0;
      background: rgba(255,255,255,0.10);
    }
    .hero-card-float {
      bottom: 0; right: -24px;
      width: 200px;
      background: rgba(42,184,212,0.15);
      border-color: rgba(42,184,212,0.3);
    }
    .service-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.1); border-radius: 100px;
      padding: 8px 16px; margin: 5px;
      color: white; font-size: 13px; font-weight: 500;
    }
    .service-pill-icon {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--color-accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
    }
    .hero-img-placeholder {
      width: 100%; aspect-ratio: 4/3;
      background: rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 16px;
      border: 1px dashed rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.4); font-size: 12px;
      font-family: monospace;
    }

    /* ── TRUST BAR ── */
    .trust-bar {
      background: white;
      border-bottom: 1px solid oklch(93% 0.01 220);
      padding: 20px 0;
    }
    .trust-bar-inner {
      max-width: 1140px; margin: 0 auto; padding: 0 32px;
      display: flex; align-items: center; justify-content: space-around;
      gap: 24px; flex-wrap: wrap;
    }
    .trust-item {
      display: flex; align-items: center; gap: 10px;
      color: var(--text-muted); font-size: 14px; font-weight: 500;
    }
    .trust-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: var(--color-accent-pale);
      display: flex; align-items: center; justify-content: center;
    }
    .trust-divider {
      width: 1px; height: 28px;
      background: oklch(90% 0.01 220);
    }

    /* ── SERVICIOS ── */
    .section-services {
      padding: 100px 0;
      background: var(--bg-white);
    }
    .section-header {
      text-align: center; max-width: 600px;
      margin: 0 auto 64px;
    }
    .section-header h2 {
      font-size: clamp(30px, 4vw, 44px);
      color: var(--color-primary); margin-bottom: 16px;
    }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
    }
    .service-card {
      background: white;
      border: 1px solid oklch(92% 0.012 220);
      border-radius: var(--radius-lg);
      padding: 36px 28px;
      transition: all 0.28s ease;
      cursor: default;
      position: relative; overflow: hidden;
    }
    .service-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--color-accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }
    .service-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: rgba(42,184,212,0.3);
    }
    .service-card:hover::before { transform: scaleX(1); }
    .service-icon-wrap {
      width: 56px; height: 56px;
      border-radius: var(--radius-md);
      background: var(--color-accent-pale);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      transition: background 0.28s;
    }
    .service-icon-wrap svg {
      color: var(--color-accent);
      transition: color 0.28s;
    }
    .service-card:hover .service-icon-wrap {
      background: var(--color-accent);
    }
    .service-card:hover .service-icon-wrap svg { color: white; }
    .service-title {
      font-family: var(--font-display); font-size: 17px; font-weight: 700;
      color: var(--color-primary); margin-bottom: 10px;
    }
    .service-desc {
      font-size: 14px; line-height: 1.65; color: var(--text-muted);
    }

    /* ── POR QUÉ NOSOTROS ── */
    .section-why {
      padding: 100px 0;
      background: #0f1a2b;
      position: relative; overflow: hidden;
    }
    .section-why::before {
      content: '';
      position: absolute; top: -200px; right: -200px;
      width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(42,184,212,0.12) 0%, transparent 70%);
    }
    .why-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 80px; align-items: center;
    }
    .why-text h2 {
      font-size: clamp(28px, 3.5vw, 42px);
      color: white; margin-bottom: 20px;
    }
    .why-text h2 span { color: var(--color-accent); }
    .why-text p { color: rgba(255,255,255,0.85); font-size: 16px; margin-bottom: 32px; }
    .why-text .section-label { color: var(--color-accent); }
    .why-text .section-label::before { background: var(--color-accent); }
    .features-list { list-style: none; display: flex; flex-direction: column; gap: 18px; }
    .feature-item {
      display: flex; gap: 16px; align-items: flex-start;
    }
    .feature-check {
      width: 24px; height: 24px; flex-shrink: 0; margin-top: 2px;
      border-radius: 50%; background: rgba(42,184,212,0.2);
      border: 1.5px solid var(--color-accent);
      display: flex; align-items: center; justify-content: center;
    }
    .feature-check svg { width: 12px; height: 12px; color: var(--color-accent); }
    .feature-text { color: rgba(255,255,255,0.75); font-size: 15px; line-height: 1.55; }
    .feature-text strong { color: white; font-weight: 600; }
    .why-visual {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    }
    .why-stat-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-lg); padding: 28px 24px;
      transition: all 0.25s;
    }
    .why-stat-card:hover {
      background: rgba(42,184,212,0.1);
      border-color: rgba(42,184,212,0.3);
      transform: translateY(-4px);
    }
    .why-stat-card.accent-card {
      background: rgba(42,184,212,0.12);
      border-color: rgba(42,184,212,0.25);
      grid-column: span 2;
    }
    .why-num {
      font-family: var(--font-display); font-size: 40px; font-weight: 800;
      color: white; line-height: 1;
    }
    .why-num span { color: var(--color-accent); font-size: 28px; }
    .why-label {
      font-size: 13px; color: rgba(255,255,255,0.5);
      margin-top: 6px; font-weight: 500;
    }
    .why-sublabel {
      font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 2px;
    }

    /* ── HORARIO ── */
    .section-hours {
      padding: 80px 0;
      background: var(--bg-light);
    }
    .hours-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
      align-items: center;
    }
    .hours-card {
      background: white; border-radius: var(--radius-xl);
      padding: 48px; box-shadow: var(--shadow-md);
    }
    .hours-card h3 {
      font-family: var(--font-display); font-size: 22px;
      color: var(--color-primary); margin-bottom: 32px;
    }
    .hours-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid oklch(93% 0.01 220);
    }
    .hours-row:last-child { border-bottom: none; }
    .hours-day { font-weight: 600; color: var(--text-primary); font-size: 15px; }
    .hours-time {
      font-family: var(--font-display); font-weight: 700;
      color: var(--color-accent); font-size: 15px;
    }
    .contact-card {
      display: flex; flex-direction: column; gap: 20px;
    }
    .contact-card h3 {
      font-family: var(--font-display); font-size: 28px;
      color: var(--color-primary); margin-bottom: 8px;
    }
    .contact-card p { font-size: 16px; margin-bottom: 8px; }
    .phone-link {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 24px;
      background: white; border-radius: var(--radius-md);
      border: 1px solid oklch(92% 0.012 220);
      text-decoration: none; color: var(--color-primary);
      font-family: var(--font-display); font-size: 20px; font-weight: 700;
      transition: all 0.22s; box-shadow: var(--shadow-sm);
    }
    .phone-link:hover {
      border-color: var(--color-accent);
      box-shadow: 0 4px 20px rgba(42,184,212,0.2);
      transform: translateX(4px);
    }
    .phone-icon {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--color-accent-pale);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .emergency-badge {
      display: flex; align-items: center; gap: 12px;
      background: oklch(97% 0.025 25); border: 1px solid oklch(88% 0.05 25);
      border-radius: var(--radius-md); padding: 14px 18px;
      color: oklch(40% 0.08 25); font-size: 14px; font-weight: 600;
    }

    /* ── CTA BAND ── */
    .section-cta {
      padding: 100px 0;
      background: linear-gradient(135deg, var(--color-accent) 0%, #1a9abd 100%);
      position: relative; overflow: hidden;
    }
    .section-cta::before {
      content: '';
      position: absolute; top: -100px; left: -100px;
      width: 400px; height: 400px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .section-cta::after {
      content: '';
      position: absolute; bottom: -120px; right: -80px;
      width: 350px; height: 350px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .cta-inner {
      position: relative; z-index: 2;
      text-align: center; max-width: 680px; margin: 0 auto;
    }
    .cta-inner h2 {
      font-size: clamp(28px, 4vw, 46px);
      color: white; margin-bottom: 16px;
    }
    .cta-inner p {
      font-size: 18px; color: rgba(255,255,255,0.8);
      margin-bottom: 40px; line-height: 1.6;
    }
    .cta-actions { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-white {
      background: white; color: var(--color-accent);
      font-family: var(--font-display); font-weight: 700;
      font-size: 15px; padding: 14px 32px;
      border-radius: var(--radius-md); border: none;
      text-decoration: none; display: inline-flex;
      align-items: center; gap: 10px; cursor: pointer;
      transition: all 0.22s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .btn-white:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.2);
    }

    /* ── FOOTER ── */
    footer {
      background: oklch(12% 0.02 220);
      padding: 64px 0 32px;
      color: rgba(255,255,255,0.55);
    }
    .footer-grid {
      display: grid; grid-template-columns: 2fr 1fr 1fr;
      gap: 60px; margin-bottom: 48px;
    }
    .footer-brand p { font-size: 14px; line-height: 1.7; margin-top: 16px; max-width: 280px; }
    .footer-brand img { height: 44px; }
    .footer-col h4 {
      font-family: var(--font-display); font-size: 13px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: white; margin-bottom: 20px;
    }
    .footer-links { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .footer-links a {
      color: rgba(255,255,255,0.5); text-decoration: none;
      font-size: 14px; transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--color-accent); }
    .footer-phone {
      display: flex; align-items: center; gap: 10px;
      color: rgba(255,255,255,0.55); font-size: 14px; margin-bottom: 8px;
    }
    .footer-phone a {
      color: white; text-decoration: none; font-weight: 600;
      font-family: var(--font-display); font-size: 15px;
    }
    .footer-phone a:hover { color: var(--color-accent); }
    .footer-bottom {
      padding-top: 28px; border-top: 1px solid rgba(255,255,255,0.08);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; flex-wrap: wrap; gap: 12px;
    }
    .footer-bottom a { color: var(--color-accent); text-decoration: none; }

    /* ── WHATSAPP FLOAT ── */
    .wa-float {
      position: fixed; bottom: 28px; right: 28px; z-index: 900;
      width: 58px; height: 58px; border-radius: 50%;
      background: #25d366;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 24px rgba(37,211,102,0.45);
      text-decoration: none; transition: all 0.22s;
    }
    .wa-float:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 32px rgba(37,211,102,0.55);
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(13,45,74,0.7);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal-box {
      background: white; border-radius: var(--radius-xl);
      padding: 48px; max-width: 480px; width: 100%;
      box-shadow: var(--shadow-lg);
      transform: translateY(24px) scale(0.97);
      transition: transform 0.3s ease;
    }

function useTweaks(defaults) {
  const [values, setValues] = useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return { tweaks: values, setTweak };
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = useState(false);
  const dragRef = useRef(null);
  const offsetRef = useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clamp = React.useCallback(() => {
    const p = dragRef.current; if (!p) return;
    const maxR = Math.max(PAD, window.innerWidth - p.offsetWidth - PAD);
    const maxB = Math.max(PAD, window.innerHeight - p.offsetHeight - PAD);
    offsetRef.current = { x: Math.min(maxR, Math.max(PAD, offsetRef.current.x)), y: Math.min(maxB, Math.max(PAD, offsetRef.current.y)) };
    p.style.right = offsetRef.current.x + 'px';
    p.style.bottom = offsetRef.current.y + 'px';
  }, []);
  useEffect(() => {
    if (open) clamp();
  }, [open, clamp]);
  useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => { setOpen(false); window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); };
  const onDragStart = (e) => {
    const p = dragRef.current; if (!p) return;
    const r = p.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const sr = window.innerWidth - r.right, sb = window.innerHeight - r.bottom;
    const move = (ev) => { offsetRef.current = { x: sr - (ev.clientX - sx), y: sb - (ev.clientY - sy) }; clamp(); };
    const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
    window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}><b>{title}</b>
          <button className="twk-x" onMouseDown={e => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return <><div className="twk-sect">{label}</div>{children}</>;

function TweakToggle({ label, value, onChange }) {

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = useRef(null);
  const [dragging, setDragging] = useState(false);
  const opts = options.map(o => typeof o === 'object' ? o : { value: o, label: o });
  const idx = Math.max(0, opts.findIndex(o => o.value === value));
  const n = opts.length;
  const valueRef = useRef(value); valueRef.current = value;
  const segAt = (cx) => { const r = trackRef.current.getBoundingClientRect(); return opts[Math.max(0, Math.min(n-1, Math.floor(((cx - r.left - 2) / (r.width - 4)) * n)))].value; };
  const onPointerDown = (e) => {
    setDragging(true); const v0 = segAt(e.clientX); if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => { const v = segAt(ev.clientX); if (v !== valueRef.current) onChange(v); };
    const up = () => { setDragging(false); window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
    window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-row"><div className="twk-lbl"><span>{label}</span></div>
      <div ref={trackRef} className={dragging ? 'twk-seg dragging' : 'twk-seg'} onPointerDown={onPointerDown}>
        <div className="twk-seg-thumb" style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map(o => <button key={o.value} type="button">{o.label}</button>)}
      </div>
    </div>
  );
}

}

/* ─── TWEAKS ─────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#2ab8d4",
  "primaryColor": "#1a4a7a",
  "showStats": true,
  "roundness": "medium"
}/*EDITMODE-END*/;

function TweaksApp() {
  const { tweaks, setTweak } = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    document.documentElement.style.setProperty('--color-accent', tweaks.accentColor);
    document.documentElement.style.setProperty('--color-accent-dark', tweaks.accentColor);
    document.documentElement.style.setProperty('--color-primary', tweaks.primaryColor);
    document.documentElement.style.setProperty('--color-primary-dark', tweaks.primaryColor);
    const radii = { small: '6px', medium: '12px', large: '20px' };
    const r = radii[tweaks.roundness] || '12px';
    document.documentElement.style.setProperty('--radius-md', r);
    document.documentElement.style.setProperty('--radius-lg', tweaks.roundness === 'small' ? '12px' : tweaks.roundness === 'large' ? '28px' : '20px');
  }, [tweaks]);

  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Colores de marca">
        <TweakColor label="Color acento (cyan)" id="accentColor" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
        <TweakColor label="Color primario (navy)" id="primaryColor" value={tweaks.primaryColor} onChange={v => setTweak('primaryColor', v)} />
      </TweakSection>
      <TweakSection label="Estilo">
        <TweakRadio label="Bordes" id="roundness" value={tweaks.roundness}
          options={[{label:'Suave', value:'small'},{label:'Medio', value:'medium'},{label:'Grande', value:'large'}]}
          onChange={v => setTweak('roundness', v)} />
      </TweakSection>
      <TweakSection label="Contenido">
        <TweakToggle label="Estadísticas en hero" id="showStats" value={tweaks.showStats} onChange={v => setTweak('showStats', v)} />
      </TweakSection>
    </TweaksPanel>
  );
}

/* ─── APP ────────────────────────────────────── */
function App() {
  const [modalOpen, setModalOpen] = useState(false);

  const openModal = () => {
    setModalOpen(true);
    document.getElementById('citaModal').classList.add('active');
  };
  const closeModalFn = () => {
    setModalOpen(false);
    document.getElementById('citaModal').classList.remove('active');
  };

  useEffect(() => {
    window.closeModal = closeModalFn;
    const overlay = document.getElementById('citaModal');
    const handler = (e) => { if (e.target === overlay) closeModalFn(); };
    overlay.addEventListener('click', handler);
    return () => overlay.removeEventListener('click', handler);
  }, []);

  return (
    <>
      <TweaksApp />
      <Navbar onCita={openModal} />
      <Hero onCita={openModal} />
      <TrustBar />
      <Servicios onCita={openModal} />
      <PorQueNosotros />
      <HorariosContacto onCita={openModal} />
      <CTAFinal onCita={openModal} />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
